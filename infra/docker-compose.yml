# Docker Compose for local development.
#
# Current services:
# - PostgreSQL: primary relational database
#
# Future services:
# - Redis: caching and coordination
# - RabbitMQ: asynchronous event queue
# - backend: DeployGuard API service
# - ai-service: incident analysis service
# - frontend: web application
#
# Local development credentials are intentionally simple and must not be reused
# outside local Docker Compose workflows.

services:
  postgres:
    image: postgres:16-alpine
    container_name: deployguard-postgres
    environment:
      POSTGRES_DB: deployguard
      POSTGRES_USER: deployguard
      POSTGRES_PASSWORD: deployguard
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deployguard -d deployguard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
