spring:
  application:
    name: deployguard-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:deployguard}
    username: ${DB_USERNAME:deployguard}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration

deployguard:
  ai-service:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8001}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
