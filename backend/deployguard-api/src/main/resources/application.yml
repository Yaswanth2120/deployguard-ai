spring:
  application:
    name: deployguard-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:deployguard}
    username: ${DB_USERNAME:deployguard}
    password: ${DB_PASSWORD}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:deployguard}
    password: ${RABBITMQ_PASSWORD:deployguard}
  flyway:
    enabled: true
    locations: classpath:db/migration

deployguard:
  ai-service:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8001}
  cors:
    allowed-origins: ${FRONTEND_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${PORT:${SERVER_PORT:8080}}
